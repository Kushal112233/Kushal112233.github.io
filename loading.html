<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>Kushalreddy.tech</title>
<style>
  /* Critical CSS: guarantees a pure black canvas with zero flash,
     even if the external stylesheet is slow or blocked. */
  html, body { background: #000; margin: 0; }
  #loading-overlay { position: fixed; inset: 0; background: #000;
    display: flex; align-items: center; justify-content: center; z-index: 100; }
  #loading-mark { width: clamp(110px, 24vw, 220px); opacity: 0; }
</style>
<link rel="icon" type="image/png" href="img/logo.png" />
<link rel="preload" as="image" href="img/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div
    id="loading-overlay"
    class="loading-overlay"
    data-mode="redirect"
    data-target="index.html"
    role="status"
    aria-label="Loading Kushalreddy.tech"
  >
    <img id="loading-mark" class="loading-mark" src="img/logo.png" alt="" />
  </div>

  <noscript>
    <meta http-equiv="refresh" content="0; url=index.html" />
  </noscript>

  <script src="js/loading.js"></script>
</body>
</html>
