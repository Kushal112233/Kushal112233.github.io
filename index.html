<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>Kushalreddy.tech</title>
<meta name="description" content="Kushalreddy.tech — official landing page." />
<style>
  /* Critical CSS: guarantees a pure black canvas with zero flash,
     even if the external stylesheet is slow or blocked. */
  html, body { background: #000; margin: 0; }
  #loading-overlay { position: fixed; inset: 0; background: #000;
    display: flex; align-items: center; justify-content: center; z-index: 100; }
  #loading-mark { width: clamp(110px, 24vw, 220px); opacity: 0; }
</style>
<link rel="icon" type="image/png" href="img/logo.png" />
<link rel="preload" as="image" href="img/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Loading intro: plays first, then reveals the page below -->
  <div
    id="loading-overlay"
    class="loading-overlay"
    data-mode="reveal"
    role="status"
    aria-label="Loading Kushalreddy.tech"
  >
    <img id="loading-mark" class="loading-mark" src="img/logo.png" alt="" />
  </div>

  <main class="page">

    <section class="hero">
      <div class="brand">
        <img class="brand-mark" src="img/logo.png" alt="Kushalreddy.tech logo" />
        <h1 class="brand-name">Kushalreddy.tech</h1>
      </div>
    </section>

    <div class="wave" aria-hidden="true">
      <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M0,64 C240,110 480,10 720,40 C960,70 1200,116 1440,56 L1440,120 L0,120 Z"
          fill="#060607"
        />
      </svg>
    </div>

    <section class="panel">
      <div class="panel-inner">
        <h2 class="panel-title">Welcome back!</h2>
        <p class="panel-subtitle">This site is still in progress — visit my portfolio.</p>
        <a class="cta" href="portfolio/" aria-label="Go to portfolio">
          <span>View the portfolio</span>
        </a>
      </div>
    </section>

  </main>

  <script src="js/loading.js"></script>
</body>
</html>
